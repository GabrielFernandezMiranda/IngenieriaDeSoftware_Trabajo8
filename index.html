<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Totalizador de Ventas</title>
  </head>
  <body>
    <h1>Totalizador de Ventas</h1>
    <form id="ventas-form">
      <label for="cantidad-items">Ingresar cantidad de items:</label>
      <input type="text" id="cantidad-items" autocomplete="off" required />
      <input type="submit" value="Registrar" id="ventas-button" />
    </form>

    <br /><br />

    <div>
      <label for="resultado-items">Cantidad de items:</label>
      <input type="text" id="resultado-items" readonly />
    </div>

    <br /><br />

    <h2>Precio por Item</h2>
    <form id="precio-form">
      <label for="precio-item">Ingresar precio por item:</label>
      <input type="text" id="precio-item" autocomplete="off" required />
      <input type="submit" value="Registrar" id="precio-button" />
    </form>

    <br /><br />

    <div>
      <label for="resultado-precio">Precio por item:</label>
      <input type="text" id="resultado-precio" readonly />
    </div>

    <br /><br />

    <h2>Precio Neto</h2>
    <form id="precio-neto-form">
      <input type="submit" value="Calcular Precio Neto" id="precio-neto-button" />
    </form>

    <br /><br />

    <div>
      <label for="resultado-precio-neto">Resultado:</label>
      <input type="text" id="resultado-precio-neto" readonly />
    </div>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
